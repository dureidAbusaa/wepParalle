<!DOCTYPE html>
<html dir="rtl" lang="ar" data-theme="dark">
<head>

<title>Chapter 7 · Parallel Processing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{--bg:#0b0e14;--surf:#141a26;--surf2:#1b2231;--ink:#e8ecf4;--ink2:#aab3c5;--ink3:#727d92;--line:#252d3d;--vio:#7c6cff;--cyan:#22c7e0;--ok:#1aa75a;--bad:#e8456b;--warn:#e8a33d;--grad:linear-gradient(135deg,#7c6cff,#22c7e0);--sh:0 8px 28px rgba(0,0,0,.4)}
[data-theme="light"]{--bg:#eef1f7;--surf:#ffffff;--surf2:#f4f6fb;--ink:#161a23;--ink2:#3f4a5e;--ink3:#7a8398;--line:#e0e5ee;--sh:0 8px 28px rgba(80,90,120,.14)}
html,body{height:100%}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Arabic",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;-webkit-font-smoothing:antialiased}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
#root:not(:empty)~#boot{display:none!important}
#boot{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:50;text-align:center}
#boot .bm{font-family:ui-monospace,monospace;font-weight:800;font-size:26px;letter-spacing:.18em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;animation:pulse 1.4s ease-in-out infinite}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.errc h3{color:var(--bad);margin-bottom:8px}.errc p{color:var(--ink2);font-size:14px}
.errc pre{direction:ltr;text-align:left;background:var(--surf2);border:1px solid var(--line);border-radius:10px;padding:14px;font-family:ui-monospace,monospace;font-size:12px;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-word;margin:14px 0}
.btn{background:var(--grad);color:#fff;border:none;border-radius:10px;padding:9px 16px;font:inherit;font-weight:700;cursor:pointer}
.btn:hover{opacity:.92}.btn--sm{padding:6px 12px;font-size:13px}

.fc h4{font-size:16px;margin:4px 0 10px}
.fc .frm{font-family:ui-monospace,monospace;font-size:14px;background:var(--surf2);border:1px solid var(--line);border-radius:9px;padding:10px;direction:ltr;text-align:center;color:var(--vio);font-weight:700;margin-bottom:10px}
.fc ul{list-style:none;font-size:13px;color:var(--ink2);margin-bottom:10px}.fc li{padding:2px 0}
.fc .ex{font-size:12.5px;color:var(--ink3);background:var(--surf2);border-radius:8px;padding:8px 10px;margin-bottom:12px}.fc .ex b{color:var(--ink2)}
.fcin{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.fcf{flex:1;min-width:110px;font-size:11px;color:var(--ink3)}
.fcf input{width:100%;background:var(--surf2);border:1.5px solid var(--line);color:var(--ink);border-radius:8px;padding:8px;font:inherit;direction:ltr;margin-top:3px}
.fcf input:focus{outline:none;border-color:var(--vio)}
.fcout{display:flex;justify-content:space-between;align-items:center;background:var(--grad);border-radius:9px;padding:11px 14px;color:#fff}
.fcout span{font-size:12px;opacity:.9}.fcout b{font-size:20px;font-family:ui-monospace,monospace}
.flash{max-width:420px;margin:0 auto 14px}
.fcard{height:200px;cursor:pointer;perspective:1200px}
.fcard .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:grid;place-items:center;padding:22px;text-align:center;border:1px solid var(--line);box-shadow:var(--sh);transition:transform .5s}
.fcard .front{background:var(--surf);transform:rotateY(0)}
.fcard.flip .front{transform:rotateY(180deg)}
.fcard .back{background:var(--surf2);transform:rotateY(180deg)}
.fcard.flip .back{transform:rotateY(360deg)}
.fcard .inner{position:relative;height:100%}
.face .hint{position:absolute;bottom:14px;left:0;right:0;font-size:11px;color:var(--ink3)}
.face .term{font-size:17px;padding:6px 14px}.face p{font-size:14.5px;color:var(--ink2)}
.fnav{display:flex;align-items:center;justify-content:center;gap:16px;font-size:13px;color:var(--ink2)}
.fnav button{background:var(--surf2);border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:15px}
.study{display:flex;flex-direction:column;gap:10px}
.st{display:flex;gap:13px;background:var(--surf);border:1px solid var(--line);border-inline-start:4px solid var(--vio);border-radius:12px;padding:14px}
.st .sno{width:30px;height:30px;border-radius:9px;background:var(--grad);color:#fff;display:grid;place-items:center;font-family:ui-monospace,monospace;font-weight:800;flex-shrink:0;font-size:14px}
.st .sic{font-size:21px}.st h4{font-size:15px;margin-bottom:3px}.st p{font-size:13px;color:var(--ink2)}
.ckbar{height:11px;background:var(--surf2);border:1px solid var(--line);border-radius:99px;overflow:hidden;position:relative;margin-bottom:14px}
.ckbar>i{display:block;height:100%;background:var(--grad);width:0;transition:width .4s}
.ckbar>span{position:absolute;inset:0;display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--ink)}
.ck{list-style:none}
.cki{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:7px;cursor:pointer;font-size:14px;transition:.15s}
.cki:hover{border-color:var(--vio)}

.rmnote{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink2);background:var(--surf2);border:1px dashed var(--line);border-radius:11px;padding:10px 14px;margin-bottom:16px}
.rmnote b{color:var(--cyan);font-family:ui-monospace,monospace}
.rmroot{display:grid;place-items:center;margin-bottom:4px}.rmroot .term{font-size:14px;padding:8px 18px}
.rmstem{width:2px;height:20px;background:var(--grad);margin:0 auto 10px}
.rmcols{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.rmcol{display:flex;flex-direction:column;gap:6px}
.rmbr{background:var(--surf);border:1.5px solid var(--vio);color:var(--ink);font-family:ui-monospace,monospace;font-weight:700;font-size:12.5px;padding:9px;border-radius:10px;cursor:pointer;direction:ltr;text-align:center}
.rmch{background:var(--surf2);border:1px solid var(--line);color:var(--ink2);font-family:ui-monospace,monospace;font-size:11.5px;padding:7px;border-radius:8px;cursor:pointer;direction:ltr;text-align:center;transition:.15s}
.rmch:hover{border-color:var(--cyan);color:var(--ink)}
.rmbr.lit{border-color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}.rmch.lit{border-color:var(--ok);color:var(--ok)}
.rmpanel{margin-top:6px}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:25}

.fitems{display:grid;gap:8px;margin-bottom:14px}

.fit .n{width:28px;height:28px;border-radius:8px;background:var(--grad);color:#fff;display:grid;place-items:center;font-family:ui-monospace,monospace;font-weight:800;font-size:13px;flex-shrink:0}
.fit .t{font-weight:600;font-size:14px;margin-bottom:2px}.fit p{font-size:13px;color:var(--ink2)}
.pfoot{text-align:center;font-size:12px;color:var(--ink3);padding:24px 0;border-top:1px solid var(--line);margin-top:30px}
@media(max-width:860px){.side{position:fixed;inset-inline-start:0;top:0;z-index:30;transform:translateX(110%);transition:transform .25s}[dir=rtl] .side{transform:translateX(-110%)}.side.open{transform:translateX(0)}.burger{display:block}.app{display:block}.wrap{display:block}}
svg text{fill:var(--ink2);font-family:ui-monospace,monospace}
.nd{fill:var(--surf2);stroke:var(--vio);stroke-width:1.5}.nd.sel{fill:var(--vio);stroke:var(--vio)}.nd.ng{fill:rgba(34,199,224,.25);stroke:var(--cyan)}

.ndt{fill:var(--ink);font-size:11px;text-anchor:middle}

<div id="root"></div>
<div id="boot"><div><div class="bm">‖‖ PARALLEL</div><div class="bs">يتم بناء الصفحة التفاعلية… (نسخة مستقلة بدون مكتبات خارجية)</div></div></div>
<div id="errpanel"></div>
<noscript><div style="max-width:680px;margin:60px auto;padding:24px;text-align:center;color:#e8ecf4;background:#19202f;border-radius:16px">تحتاج هذه الصفحة إلى تفعيل JavaScript.</div></noscript>

<script>
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function showError(t){var b=document.getElementById('boot');if(b)b.style.display='none';var p=document.getElementById('errpanel');if(!p)return;p.style.display='block';p.innerHTML='<div class="errc"><h3>تعذّر تشغيل الصفحة</h3><p>حدث خطأ أثناء التشغيل — التفاصيل بالأسفل:</p><pre dir="ltr">'+escapeHtml(t)+'</pre><button class="btn" onclick="location.reload()">إعادة المحاولة</button></div>';}
window.onerror=function(m,s,l,c,e){showError((e&&e.stack)?e.stack:(m+' @'+l+':'+c));return false;};
window.addEventListener('unhandledrejection',function(e){var r=e&&e.reason;showError('Rejection: '+((r&&r.stack)?r.stack:r));});
setTimeout(function(){var r=document.getElementById('root');if(r&&r.children.length===0&&document.getElementById('errpanel').style.display!=='block')showError('لم يُرسم التطبيق ضمن المهلة. قد تكون بيئة المعاينة تمنع تنفيذ JavaScript.');},4000);
</script>

<script>
(function(){
"use strict";
